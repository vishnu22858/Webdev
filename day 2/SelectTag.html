<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select>
        <option selected>Country</option>
        <option>India</option>
        <option>USA</option>
        <option disabled>China</option>
    </select>

    <select multiple>
        <option selected>Country</option>
        <option>India</option>
        <option>USA</option>
        <option>China</option>
    </select>
    
    <select size="2">
        <option selected>Country</option>
        <option>India</option>
        <option>USA</option>
        <option>China</option>
        <option>Korea</option>
        <option>Canada</option>
    </select>
</body>
</html>
